version: "3.8"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      - WEBBREAKER_DB=/data/webbreaker.db
      - WEBBREAKER_HOST=0.0.0.0
      - WEBBREAKER_PORT=3100
    volumes:
      - webbreaker-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/scans"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # For GPU support, uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  webbreaker-data:
  ollama-data: